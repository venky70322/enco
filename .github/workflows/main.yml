name: RTL CI AUTO MERGE

permissions:
  contents: write

on:
  push:
    branches:
      - feature
      - feature/*

jobs:
  simulate-and-merge:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Path
        run: pwd

      - name: List Files
        run: ls

      - name: Run Simulation
        run: unset VERILATOR_ROOT && make all

      - name: Configure Git User
        run: |
          git config --global user.name github-actions
          git config --global user.email actions@github.com

      - name: Fetch Main
        run: git fetch origin main

      - name: Checkout Main
        run: git checkout main

      - name: Merge Feature to Main
        run: |
          git merge --no-ff "${GITHUB_REF_NAME}" \
          -m "Merge branch '${GITHUB_REF_NAME}'" \
          -X theirs --allow-unrelated-histories

      - name: Push Main
        run: git push origin main
